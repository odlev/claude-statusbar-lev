name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (shellcheck + syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Syntax check (bash -n)
        run: |
          bash -n statusline.sh
          bash -n install.sh
          bash -n uninstall.sh

      - name: shellcheck
        run: shellcheck -S warning statusline.sh install.sh uninstall.sh

  smoke-unix:
    name: Smoke test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq available
        run: |
          if ! command -v jq >/dev/null; then
            if [ "${{ matrix.os }}" = "macos-latest" ]; then
              brew install jq
            else
              sudo apt-get update -qq && sudo apt-get install -y jq
            fi
          fi
          jq --version

      - name: --version flag
        run: bash statusline.sh --version

      - name: --help flag
        run: bash statusline.sh --help

      - name: Smoke test with sample input (no network)
        env:
          STATUSLINE_USAGE_LIMITS: "0"
        run: |
          OUTPUT=$(cat examples/sample-input.json | bash statusline.sh)
          echo "$OUTPUT"
          # Expect at least 2 non-empty lines (line 3 disabled by env)
          LINES=$(printf '%s\n' "$OUTPUT" | grep -c . || true)
          test "$LINES" -ge 2

  smoke-windows:
    name: Smoke test (windows git-bash)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq available
        shell: pwsh
        run: |
          if (-not (Get-Command jq -ErrorAction SilentlyContinue)) {
            choco install jq -y --no-progress
          }
          jq --version

      - name: --version flag
        run: bash statusline.sh --version

      - name: Smoke test with sample input (no network)
        env:
          STATUSLINE_USAGE_LIMITS: "0"
        run: |
          OUTPUT=$(cat examples/sample-input.json | bash statusline.sh)
          echo "$OUTPUT"
          LINES=$(printf '%s\n' "$OUTPUT" | grep -c . || true)
          test "$LINES" -ge 2
